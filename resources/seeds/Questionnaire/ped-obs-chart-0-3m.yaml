          - linkId: fluid-summary-markdown
            type: display
            itemControl:
              coding:
                - code: markdown
            variable:
              - name: FluidInputGroups
                language: text/fhirpath
                expression: "%resource.repeat(item).where(linkId='fluid-balance-intake-table-group')"
              - name: FluidOutputGroups
                language: text/fhirpath
                expression: "%resource.repeat(item).where(linkId='fluid-balance-output-table-group')"
              - name: FluidDates 
                language: text/fhirpath
                expression: >
                  (
                    %FluidInputGroups.select(
                      item.where(linkId='fluid-intake-time').answer.valueDateTime.toString().substring(0, 10)
                    ) |
                    %FluidOutputGroups.select(
                      item.where(linkId='fluid-output-time').answer.valueDateTime.toString().substring(0, 10)
                    )
                  ).distinct()
            text: Summary
            _text:
              cqfExpression:
                language: text/fhirpath
                expression: >-
                  iif(
                    %FluidDates.exists(),
                    '## Fluid Balance Summary\n' &
                    '|Date|Daily Intake Total (mL)|Daily Output Total (mL)|Daily Net Balance (mL)|\n|-|-|-|-|\n' &
                    %FluidDates.select(
                      defineVariable('date').select(
                        (
                          %FluidInputGroups.where(
                            item.where(
                              linkId='fluid-intake-time'
                            ).answer.valueDateTime.toString().startsWith(%date)
                          ).item.where(
                            linkId='fluid-intake-prog-total'
                          ).answer.valueDecimal.sum() | 0
                        ).first().defineVariable('input').select(
                          (
                            %FluidOutputGroups.where(
                              item.where(
                                linkId='fluid-output-time'
                              ).answer.valueDateTime.toString().startsWith(%date)
                            ).item.where(
                              linkId='fluid-output-prog-total'
                            ).answer.valueDecimal.sum() | 0
                          ).first().defineVariable('output').select(
                            '|' & %date & '|' & %input.toString() & '|' & %output.toString() & '|' & (%input - %output).toString() & '|'
                          )
                        )
                      )
                    ).join('\n'),
                    ''
                  )
              

          # Fluid Balance — Grand Totals (sum across all rows)

          - linkId: fluid-balance-summary-group
            type: group
            variable:
              - name: TotalIntake
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(
                    linkId='fluid-balance-intake-table-group'
                  ).select(
                    item.where(linkId='fluid-intake-prog-total').answer.valueDecimal
                  ).sum()
              - name: TotalOutput
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(
                    linkId='fluid-balance-output-table-group'
                  ).select(
                    item.where(linkId='fluid-output-prog-total').answer.valueDecimal
                  ).sum()
            item:
              - linkId: fluid-balance-intake-total
                text: Total Intake (All Dates, mL)
                type: decimal
                readOnly: true
                calculatedExpression:
                  language: text/fhirpath
                  expression: "%TotalIntake"

              - linkId: fluid-balance-output-total
                text: Total Output (All Dates, mL)
                type: decimal
                readOnly: true
                calculatedExpression:
                  language: text/fhirpath
                  expression: "%TotalOutput"

              - linkId: fluid-balance-net
                text: Total Net Balance (All Dates, mL)
                type: decimal
                readOnly: true
                calculatedExpression:
                  language: text/fhirpath
                  expression: "%TotalIntake - %TotalOutput"

