id: ped-obs-chart-0-3m
resourceType: Questionnaire
name: ped-obs-chart-0-3m
title: Paediatric Observation Chart (Under 3 Months)
status: active
subjectType:
  - Patient
  - Encounter
url: ped-obs-chart-0-3m
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
useContext:
  - code:
      code: questionnaire-type
      system: https://beda.software/FHIR/CodeSystem/questionnaire-type
    value:
      CodeableConcept:
        coding:
          - code: form-library
launchContext:
  - name:
      code: Patient
    type:
      - Patient
  - name:
      code: Author
    type:
      - PractitionerRole
      - Practitioner
      - Patient
      - Organization
item:
  - text: PatientId
    type: string
    linkId: patientId
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.id"

  - text: PatientName
    type: string
    linkId: patientName
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.name.first().given.first() + ' ' + %Patient.name.first().family"

  - linkId: observation-chart-tabs-view
    type: group
    itemControl:
      coding:
        - code: group-tabs
    item:
      - linkId: observations-graph-wizard-group
        text: Observations
        type: group
        item:
          # Allergies / Alerts

          - linkId: alerts-orders-table-group
            text: Allergies / Alerts
            type: group
            repeats: true
            itemControl:
              coding:
                - code: group-table
            item:
              - linkId: alerts-orders-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: allergy-alerts
                text: Allergy / Alerts
                type: text

              - linkId: weight
                text: Weight, kg
                type: quantity
                entryFormat: Enter value
                unit:
                  code: kg
                  system: http://unitsofmeasure.org
                  display: kg

              - linkId: fluid-restriction
                text: Fluid Restriction
                type: choice
                entryFormat: Select
                itemControl:
                  coding:
                    - code: inline-choice
                answerOption:
                  - valueCoding:
                      code: na
                      display: "N/A"
                  - valueCoding:
                      code: "yes"
                      display: "Yes"

              - linkId: fluid-restriction-volume
                text: Volume, mL
                type: quantity
                entryFormat: Enter value
                unit:
                  code: mL
                  system: http://unitsofmeasure.org
                  display: mL
                enableWhen:
                  - question: fluid-restriction
                    operator: "="
                    answerCoding:
                      code: "yes"

          - linkId: explanation-group
            type: group
            hidden: true
            item:
              - linkId: blue-zone-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: >-
                  :::info-alert

                  ### **Blue Zone Response**

                  - Initiate appropriate clinical care

                  - Repeat and increase the frequency of observations as indicated by your patients conditions

                  - Consider whether there is an adverse trend in other observation

                  :::

              - linkId: yellow-zone-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: >-
                  :::warning-alert

                  ### **Additional Yellow Zone Criteria**

                  - Increasing oxygen requirement

                  - Poor peripheral circulation (e.g. mottled/pallor)

                  - Greater than expected fluid loss

                  - Reduced urine output or anuria (< 1mL/kg/hr)

                  - Altered mental state: Agitation, combative, inconsolable.

                  - New, increasing or uncontrolled pain

                  - Blood Glucose Level 2 – 3 mmol/L

                  - **Concern by family member**

                  - **Concern by you or any staff member**

                  - Senior Medical Officer or Nurse review within 30 minutes.

                  - Observations recorded at least 30 minutely for the first hour and then hourly thereafter.

                  - Prioritise care if deteriorating.


                  **Consider:**

                  - Need for continuous monitoring.

                  - Whether changes in temperature reflects deterioration in your patient

                  :::

              - linkId: red-zone-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: >-
                  :::error-alert

                  ### **Additional Red Zone Criteria**

                  **Cardiac or respiratory arrest / Circulatory collapse / Patient unresponsive / New onset of stridor**

                  - No change or signs of improvement within 1 hour of CERS

                  - 3 or more simultaneous 'Yellow Zone' observations

                  - Significant Bleeding

                  - Sudden decrease in Level of Consciousness (a drop of 2 or more points in GCS)

                  - New or prolonged seizures activity

                  - Floppy

                  - Blood Glucose Level < 2mmol/L or symptomatic

                  - **Serious concern by family member**

                  - **Serious concern by you or any staff member**

                  - Senior Medical Officer or Nurse review within 10 minutes.

                  - Observations recorded at least 15 minutely.

                  - Must have continuous monitoring.

                  :::

          # Patient / Family Concern

          - linkId: patient-family-concern-table-group
            text: Patient / Family Concern
            type: group
            repeats: true
            enableChart:
              linkIdX: patient-family-concern-date
              linkIdY: patient-family-concern-value
            chartHighlight:
              # Yes (index 0) — yellow zone (warning border, translucent)
              - from: -0.5
                to: 0.5
                color: "#ffe58f99"
              # Not asked (index 2) — neutral row (theme gray_5, translucent)
              - from: 1.5
                to: 2.5
                color: "#d9d9d999"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: Concern
                language: text/fhirpath
                expression: "%context.item.where(linkId='patient-family-concern-value').answer.valueCoding.code"
              - name: ConcernLevel
                language: text/fhirpath
                expression: >-
                  iif(%Concern.exists() and %Concern.first() = 'yes', 'yellow-zone', {})
            item:
              - linkId: patient-family-concern-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                columnWidth:
                  value: 150
                  unit: px
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: patient-family-concern-value
                text: Are you worried they are getting worse?
                type: choice
                entryFormat: Select response
                itemControl:
                  coding:
                    - code: inline-choice
                answerOption:
                  - valueCoding:
                      code: "yes"
                      display: "Yes"
                  - valueCoding:
                      code: "no"
                      display: "No"
                  - valueCoding:
                      code: not-asked
                      display: Not asked

              - linkId: patient-family-concern-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%ConcernLevel & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: "%ConcernLevel.exists()"

          # Respiratory Rate

          - linkId: respiratory-rate-table-group
            text: Respiratory Rate, breaths/minute
            type: group
            repeats: true
            enableChart:
              linkIdX: respiratory-rate-date
              linkIdY: respiratory-rate-value
            chartYAxisRange:
              low:
                value: 15
              high:
                value: 85
            chartHighlight:
              # ≤ 20 red zone
              - to: 20
                color: "#ffccc799"
              # 20–25 yellow zone
              - from: 20
                to: 25
                color: "#ffe58f99"
              # 25–30 blue zone
              - from: 25
                to: 30
                color: "#adcaff99"
              # 30–55 normal (no shading)
              # 55–65 blue zone
              - from: 55
                to: 65
                color: "#adcaff99"
              # 65–75 yellow zone
              - from: 65
                to: 75
                color: "#ffe58f99"
              # ≥ 75 red zone
              - from: 75
                color: "#ffccc799"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: RR
                language: text/fhirpath
                expression: "%context.item.where(linkId='respiratory-rate-value').answer.valueQuantity.value"
              - name: RRDefaultLevel
                language: text/fhirpath
                expression: >-
                  iif(%RR.exists(),
                    iif(%RR.first() <= 20, 'red-zone',
                      iif(%RR.first() <= 25, 'yellow-zone',
                        iif(%RR.first() <= 30, 'blue-zone',
                          iif(%RR.first() <= 55, {},
                            iif(%RR.first() <= 65, 'blue-zone',
                              iif(%RR.first() <= 75, 'yellow-zone', 'red-zone')))))),
                    {}
                  )
              - name: RRDate
                language: text/fhirpath
                expression: "%context.item.where(linkId='respiratory-rate-date').answer.valueDateTime.first()"
              - name: RRModificationGroup
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(linkId='modifications-amendments-table-group').where(
                    item.where(linkId='modifications-amendments-measurement').answer.valueCoding.code = 'respiratory-rate' and
                    item.where(linkId='modifications-amendments-date').answer.valueDateTime <= %RRDate.toDateTime() and
                    item.where(linkId='modifications-amendments-valid-until').answer.valueDateTime >= %RRDate.toDateTime()
                  ).last()
              - name: RRModificationMinValue
                language: text/fhirpath
                expression: "%RRModificationGroup.item.where(linkId='modifications-amendments-value-min').answer.valueDecimal"
              - name: RRModificationMaxValue
                language: text/fhirpath
                expression: "%RRModificationGroup.item.where(linkId='modifications-amendments-value-max').answer.valueDecimal"
              - name: RRLevel
                language: text/fhirpath
                expression: >-
                  iif(
                    %RRModificationGroup.exists() and %RR >= %RRModificationMinValue and %RR <= %RRModificationMaxValue,
                    {},
                    %RRDefaultLevel
                  )
            item:
              - linkId: respiratory-rate-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: respiratory-rate-value
                text: Respiratory Rate, breaths/minute
                type: quantity
                entryFormat: Enter value
                unit:
                  code: /min
                  system: http://unitsofmeasure.org
                  display: breaths/min

              - linkId: respiratory-rate-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%RRLevel & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: >-
                    %RRLevel.exists()

          # Respiratory Distress

          - linkId: respiratory-distress-table-group
            text: Respiratory Distress
            type: group
            repeats: true
            enableChart:
              linkIdX: respiratory-distress-date
              linkIdY: respiratory-distress-value
            chartHighlight:
              # Mild (index 1) — blue zone
              - from: 0.5
                to: 1.5
                color: "#adcaff99"
              # Moderate (index 2) — yellow zone
              - from: 1.5
                to: 2.5
                color: "#ffe58f99"
              # Severe (index 3) — red zone
              - from: 2.5
                to: 3.5
                color: "#ffccc799"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: RespDistressValue
                language: text/fhirpath
                expression: "%context.item.where(linkId='respiratory-distress-value').answer.valueCoding.code"
              - name: RespDistressLevel
                language: text/fhirpath
                expression: >-
                  iif(%RespDistressValue.exists(),
                    iif(%RespDistressValue.first() = 'normal', {},
                      iif(%RespDistressValue.first() = 'mild', 'blue-zone',
                        iif(%RespDistressValue.first() = 'moderate', 'yellow-zone', 'red-zone'))),
                    {}
                  )
            item:
              - linkId: respiratory-distress-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: respiratory-distress-value
                text: Value
                type: choice
                entryFormat: Select value
                itemControl:
                  coding:
                    - code: inline-choice
                answerOption:
                  - valueCoding:
                      code: normal
                      display: Normal
                  - valueCoding:
                      code: mild
                      display: Mild
                  - valueCoding:
                      code: moderate
                      display: Moderate
                  - valueCoding:
                      code: severe
                      display: Severe

              - linkId: respiratory-distress-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%RespDistressLevel & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: >-
                    %RespDistressLevel.exists()

          # SpO2

          - linkId: spo2-table-group
            text: SpO2, %
            type: group
            repeats: true
            enableChart:
              linkIdX: spo2-date
              linkIdY: spo2-value
            chartYAxisRange:
              low:
                value: 70
              high:
                value: 100
            chartHighlight:
              # ≤ 90 red zone
              - to: 90
                color: "#ffccc799"
              # 91–95 yellow zone
              - from: 90
                to: 95
                color: "#ffe58f99"
              # ≥ 96 normal (no shading)
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: SpO2
                language: text/fhirpath
                expression: "%context.item.where(linkId='spo2-value').answer.valueQuantity.value"
              - name: SpO2DefaultLevel
                language: text/fhirpath
                expression: >-
                  iif(%SpO2.exists(),
                    iif(%SpO2.first() <= 90, 'red-zone',
                      iif(%SpO2.first() <= 95, 'yellow-zone', {})),
                    {}
                  )
              - name: SpO2Date
                language: text/fhirpath
                expression: "%context.item.where(linkId='spo2-date').answer.valueDateTime.first()"
              - name: SpO2ModificationGroup
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(linkId='modifications-amendments-table-group').where(
                    item.where(linkId='modifications-amendments-measurement').answer.valueCoding.code = 'o2-saturation' and
                    item.where(linkId='modifications-amendments-date').answer.valueDateTime <= %SpO2Date.toDateTime() and
                    item.where(linkId='modifications-amendments-valid-until').answer.valueDateTime >= %SpO2Date.toDateTime()
                  ).last()
              - name: SpO2ModificationMinValue
                language: text/fhirpath
                expression: "%SpO2ModificationGroup.item.where(linkId='modifications-amendments-value-min').answer.valueDecimal"
              - name: SpO2ModificationMaxValue
                language: text/fhirpath
                expression: "%SpO2ModificationGroup.item.where(linkId='modifications-amendments-value-max').answer.valueDecimal"
              - name: SpO2Level
                language: text/fhirpath
                expression: >-
                  iif(
                    %SpO2ModificationGroup.exists() and %SpO2 >= %SpO2ModificationMinValue and %SpO2 <= %SpO2ModificationMaxValue,
                    {},
                    %SpO2DefaultLevel
                  )
            item:
              - linkId: spo2-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: spo2-value
                text: SpO2, %
                type: quantity
                entryFormat: Enter value
                unit:
                  code: "%"
                  system: http://unitsofmeasure.org
                  display: "%"

              - linkId: spo2-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%SpO2Level & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: >-
                    %SpO2Level.exists()

          # Oxygen

          - linkId: oxygen-table-group
            text: Oxygen
            type: group
            repeats: true
            itemControl:
              coding:
                - code: group-table
            item:
              - linkId: o2-delivery-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"

              - linkId: o2-delivery-value
                text: L/min or %
                type: quantity
                entryFormat: Enter value

              - linkId: o2-device-mode
                text: Device
                type: string
                entryFormat: Enter device

          # Heart Rate

          - linkId: heart-rate-table-group
            text: Heart Rate, beats/minute
            type: group
            repeats: true
            enableChart:
              linkIdX: heart-rate-date
              linkIdY: heart-rate-value
            chartYAxisRange:
              low:
                value: 60
              high:
                value: 210
            chartHighlight:
              # ≤ 80 red zone
              - to: 80
                color: "#ffccc799"
              # 80–100 yellow zone
              - from: 80
                to: 100
                color: "#ffe58f99"
              # 100–110 blue zone
              - from: 100
                to: 110
                color: "#adcaff99"
              # 110–160 normal (no shading)
              # 160–170 blue zone
              - from: 160
                to: 170
                color: "#adcaff99"
              # 170–190 yellow zone
              - from: 170
                to: 190
                color: "#ffe58f99"
              # ≥ 190 red zone
              - from: 190
                color: "#ffccc799"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: HR
                language: text/fhirpath
                expression: "%context.item.where(linkId='heart-rate-value').answer.valueQuantity.value"
              - name: HRDefaultLevel
                language: text/fhirpath
                expression: >-
                  iif(%HR.exists(),
                    iif(%HR.first() <= 80, 'red-zone',
                      iif(%HR.first() <= 100, 'yellow-zone',
                        iif(%HR.first() <= 110, 'blue-zone',
                          iif(%HR.first() <= 160, {},
                            iif(%HR.first() <= 170, 'blue-zone',
                              iif(%HR.first() <= 190, 'yellow-zone', 'red-zone')))))),
                    {}
                  )
              - name: HRDate
                language: text/fhirpath
                expression: "%context.item.where(linkId='heart-rate-date').answer.valueDateTime.first()"
              - name: HRModificationGroup
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(linkId='modifications-amendments-table-group').where(
                    item.where(linkId='modifications-amendments-measurement').answer.valueCoding.code = 'heart-rate' and
                    item.where(linkId='modifications-amendments-date').answer.valueDateTime <= %HRDate.toDateTime() and
                    item.where(linkId='modifications-amendments-valid-until').answer.valueDateTime >= %HRDate.toDateTime()
                  ).last()
              - name: HRModificationMinValue
                language: text/fhirpath
                expression: "%HRModificationGroup.item.where(linkId='modifications-amendments-value-min').answer.valueDecimal"
              - name: HRModificationMaxValue
                language: text/fhirpath
                expression: "%HRModificationGroup.item.where(linkId='modifications-amendments-value-max').answer.valueDecimal"
              - name: HRLevel
                language: text/fhirpath
                expression: >-
                  iif(
                    %HRModificationGroup.exists() and %HR >= %HRModificationMinValue and %HR <= %HRModificationMaxValue,
                    {},
                    %HRDefaultLevel
                  )
            item:
              - linkId: heart-rate-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: heart-rate-value
                text: Heart Rate, beats/minute
                type: quantity
                entryFormat: Enter value
                unit:
                  code: /min
                  system: http://unitsofmeasure.org
                  display: beats/min

              - linkId: heart-rate-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%HRLevel & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: >-
                    %HRLevel.exists()

          # Capillary Refill

          - linkId: capillary-refill-table-group
            text: Capillary Refill
            type: group
            repeats: true
            enableChart:
              linkIdX: capillary-refill-date
              linkIdY: capillary-refill-value
            chartYAxisRange:
              low:
                value: 0
              high:
                value: 6
            chartHighlight:
              # ≥ 3 seconds — yellow zone
              - from: 3
                color: "#ffe58f99"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: CapRefill
                language: text/fhirpath
                expression: "%context.item.where(linkId='capillary-refill-value').answer.valueQuantity.value"
              - name: CapRefillDefaultLevel
                language: text/fhirpath
                expression: >-
                  iif(%CapRefill.exists(),
                    iif(%CapRefill.first() >= 3, 'yellow-zone', {}),
                    {}
                  )
              - name: CapRefillDate
                language: text/fhirpath
                expression: "%context.item.where(linkId='capillary-refill-date').answer.valueDateTime.first()"
              - name: CapRefillModificationGroup
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(linkId='modifications-amendments-table-group').where(
                    item.where(linkId='modifications-amendments-measurement').answer.valueCoding.code = 'capillary-refill' and
                    item.where(linkId='modifications-amendments-date').answer.valueDateTime <= %CapRefillDate.toDateTime() and
                    item.where(linkId='modifications-amendments-valid-until').answer.valueDateTime >= %CapRefillDate.toDateTime()
                  ).last()
              - name: CapRefillModificationMinValue
                language: text/fhirpath
                expression: "%CapRefillModificationGroup.item.where(linkId='modifications-amendments-value-min').answer.valueDecimal"
              - name: CapRefillModificationMaxValue
                language: text/fhirpath
                expression: "%CapRefillModificationGroup.item.where(linkId='modifications-amendments-value-max').answer.valueDecimal"
              - name: CapRefillLevel
                language: text/fhirpath
                expression: >-
                  iif(
                    %CapRefillModificationGroup.exists() and %CapRefill >= %CapRefillModificationMinValue and %CapRefill <= %CapRefillModificationMaxValue,
                    {},
                    %CapRefillDefaultLevel
                  )
            item:
              - linkId: capillary-refill-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: capillary-refill-value
                text: Capillary Refill, seconds
                type: quantity
                entryFormat: Enter value
                unit:
                  code: s
                  system: http://unitsofmeasure.org
                  display: seconds

              - linkId: capillary-refill-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%CapRefillLevel & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: >-
                    %CapRefillLevel.exists()

          # Systolic Blood Pressure

          - linkId: blood-pressure-table-group
            text: Systolic Blood Pressure, mmHg
            type: group
            repeats: true
            enableChart:
              linkIdX: blood-pressure-date
              linkIdY: blood-pressure-systolic
            chartYAxisRange:
              low:
                value: 30
              high:
                value: 130
            chartHighlight:
              # ≤ 50 red zone
              - to: 50
                color: "#ffccc799"
              # 50–60 yellow zone
              - from: 50
                to: 60
                color: "#ffe58f99"
              # 60–100 normal (no shading)
              # 100–120 yellow zone
              - from: 100
                to: 120
                color: "#ffe58f99"
              # ≥ 120 red zone
              - from: 120
                color: "#ffccc799"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: SystolicBP
                language: text/fhirpath
