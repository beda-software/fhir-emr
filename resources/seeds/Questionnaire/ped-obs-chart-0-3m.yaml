      - linkId: instructions-wizard-group
        text: Instructions
        type: group
        item:
          - linkId: instructions-display
            type: display
            itemControl:
              coding:
                - code: markdown
            text: >-
              ## Paediatric Emergency Department Observation Chart (Under 3 Months)

              **ALL OBSERVATIONS MUST BE GRAPHED**


              Refer to your local Clinical Emergency Response System (CERS) protocol for instructions on how to make a call to escalate care.


              ### Altered Calling Criteria

              Any alterations **MUST** be signed by a Senior Emergency Department Medical Officer.

              Document rationale for altering CALLING CRITERIA in the patient's health care record.

          - linkId: instructions-blue-zone-card
            type: display
            itemControl:
              coding:
                - code: markdown
            text: >-
              ::::info-card

              ### **Blue Zone Response**

              :::layout-inner

              - Initiate appropriate clinical care

              - Repeat and increase the frequency of observations as indicated by your patients conditions

              - Consider whether there is an adverse trend in other observation

              :::

              ::::

          - linkId: instructions-yellow-zone-card
            type: display
            itemControl:
              coding:
                - code: markdown
            text: >-
              ::::warning-card

              ### **Additional Yellow Zone Criteria**

              :::layout-columns

              - Increasing oxygen requirement

              - Poor peripheral circulation (e.g. mottled/pallor)

              - Greater than expected fluid loss

              - Reduced urine output or anuria (< 1mL/kg/hr)

              - Altered mental state: Agitation, combative, inconsolable.

              - New, increasing or uncontrolled pain

              - Blood Glucose Level 2 – 3 mmol/L

              - **Concern by family member**

              - **Concern by you or any staff member**

              - Senior Medical Officer or Nurse review within 30 minutes.

              - Observations recorded at least 30 minutely for the first hour and then hourly thereafter.

              - Prioritise care if deteriorating.

              :::

              :::layout-inner

              **Consider:**

              - Need for continuous monitoring.

              - Whether changes in temperature reflects deterioration in your patient

              :::

              ::::

          - linkId: instructions-red-zone-card
            type: display
            itemControl:
              coding:
                - code: markdown
            text: >-
              :::::error-card

              ### **Additional Red Zone Criteria**

              ::::layout-inner

              **Cardiac or respiratory arrest / Circulatory collapse / Patient unresponsive / New onset of stridor**

              ::::

              ::::layout-columns

              - No change or signs of improvement within 1 hour of CERS

              - 3 or more simultaneous 'Yellow Zone' observations

              - Significant Bleeding

              - Sudden decrease in Level of Consciousness (a drop of 2 or more points in GCS)

              - New or prolonged seizures activity

              - Floppy

              - Blood Glucose Level < 2mmol/L or symptomatic

              - **Serious concern by family member**

              - **Serious concern by you or any staff member**

              - Senior Medical Officer or Nurse review within 10 minutes.

              - Observations recorded at least 15 minutely.

              - Must have continuous monitoring.

              ::::

              :::::

          - linkId: respiratory-distress-reference-table
            type: display
            itemControl:
              coding:
                - code: markdown
            text: |-
              ## Assessment of Respiratory Distress

              *Respiratory distress is based on the most significant feature (Severe - Moderate - Mild)*

              | | **MILD** | **MODERATE** | **SEVERE** |
              |---|---|---|---|
              | **Airway** | Stridor on exertion | Stridor at rest | New onset of stridor; Absent breath sounds (silent chest) |
              | **Behaviour & posture** | Normal; Can walk or crawl | Irritability; Lethargic; Tripod sitting | Agitated / confused / drowsy; Collapsed or exhausted |
              | **Speaking & feeding** | Normal; Talks in sentences | Difficulty talking / vocalising or crying; Difficulty feeding or eating | Unable to talk / vocalise or cry; Unable to feed or eat |
              | **Respiratory rate** | Respiratory rate in the Blue Zone | Respiratory rate in the Yellow Zone | Respiratory rate in the Red Zone; Decreasing respiratory rate (exhaustion) |
              | **Respiratory effort** | None / minimal | Moderate recession; Tracheal tug; Nasal flaring; Head bob | Severe recession; Seesaw / abdominal breathing; Gasping; Grunting |
              | **Apnoeic episodes** | None | Irregular breathing pattern | Apnoeic episodes |
              | **Oxygen** | No oxygen requirement | Commencement of oxygen; Increasing oxygen requirement | Hypoxaemia, may not be correct by oxygen; Extreme pallor; Cyanosis |

          - linkId: nips-reference-table
            type: display
            itemControl:
              coding:
                - code: markdown
            text: |-
              ## Neonatal / Infant Pain Scale (NIPS)

              *NIPS interpretation — add the scores from each of the 6 assessments to a total of between 0–7*

              *0 = No pain · ≤ 2 = Mild discomfort · 3–4 = Mild to moderate pain · 5–7 = Moderate to severe pain*

              | **Assessment** | **Score = 0** | **Score = 1** | **Score = 2** |
              |---|---|---|---|
              | **Facial expression** | **Relaxed muscles** (Restful face, neutral expression) | **Grimace** (Tight facial muscles; furrowed brow, chin, jaw) | — |
              | **Cry** | **No Cry** (Quiet, not crying) | **Whimper** (Mild moaning, intermittent) | **Vigorous Cry** (Loud scream; rising, shrill, continuous) |
              | **Breathing patterns** | **Relaxed** (Usual pattern for this infant) | **Change in breathing** (Indrawing, irregular, faster than usual; gagging; breath holding) | — |
              | **Arms** | **Relaxed/Restrained** (No muscular rigidity; occasional random movements of arms) | **Flexed/Extended** (Tense, straight arms; rigid and/or rapid extension, flexion) | — |
              | **Legs** | **Relaxed/Restrained** (No muscular rigidity; occasional random movement) | **Flexed/Extended** (Tense, straight legs; rigid and/or rapid extension, flexion) | — |
              | **State of arousal** | **Sleeping/Awake** (Quiet, peaceful, sleeping or alert and settled) | **Fussy** (Alert, restless, and thrashing) | — |

