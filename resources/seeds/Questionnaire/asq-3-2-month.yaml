                    valueDecimal: 0

          - linkId: gm-4
            text: "4. When your baby is on her back, does she kick her legs?"
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
              - valueCoding:
                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

          - linkId: gm-5
            text: "5. While your baby is on his back, does he move his head from side to side?"
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
              - valueCoding:
                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

          - linkId: gm-6
            text: "6. After holding her head up while on her tummy, does your baby lay her head back down on the floor, rather than let it drop or fall forward?"
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
              - valueCoding:
                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

          - linkId: gross-motor-section-total
            type: display
            itemControl:
              coding:
                - code: markdown
            variable:
              - name: gmSectionTotal
                language: text/fhirpath
                expression: "(%resource.repeat(item).where(linkId.startsWith('gm-')).answer.valueCoding.where(code='yes').count() * 10) + (%resource.repeat(item).where(linkId.startsWith('gm-')).answer.valueCoding.where(code='sometimes').count() * 5)"
            _text:
