            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
              - valueCoding:
                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
