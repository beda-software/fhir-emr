                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

          - linkId: gm-2
            text: "2. When your baby is on her tummy, does she turn her head to the side?"
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
