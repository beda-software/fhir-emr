id: asq-3-2-month
resourceType: Questionnaire
name: asq-3-2-month
title: "ASQ-3: 2 Month Questionnaire"
status: active
subjectType:
  - Patient
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
url: https://aidbox.emr.beda.software/fhir/Questionnaire/asq-3-2-month
launchContext:
  - name:
      code: Patient
    type:
      - Patient
item:
  - linkId: wizard
    type: group
    itemControl:
      coding:
        - code: wizard

    item:
      # ============================================================
      # STEP 1: COMMUNICATION
      # ============================================================
      - linkId: communication
        text: Communication
        type: group
        item:
          - linkId: comm-1
            text: "1. Does your baby sometimes make throaty or gurgling sounds?"
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
              - valueCoding:
                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

          - linkId: comm-2
            text: '2. Does your baby make cooing sounds such as "ooo," "gah," and "aah"?'
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
              - valueCoding:
                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

          - linkId: comm-3
            text: "3. When you speak to your baby, does she make sounds back to you?"
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
              - valueCoding:
                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

          - linkId: comm-4
            text: "4. Does your baby smile when you talk to him?"
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
              - valueCoding:
                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

          - linkId: comm-5
            text: "5. Does your baby chuckle softly?"
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
              - valueCoding:
                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

          - linkId: comm-6
            text: "6. After you have been out of sight, does your baby smile or get excited when she sees you?"
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
              - valueCoding:
                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

          - linkId: communication-section-total
            type: display
            itemControl:
              coding:
                - code: markdown
            variable:
              - name: commSectionTotal
                language: text/fhirpath
                expression: "(%resource.repeat(item).where(linkId.startsWith('comm-')).answer.valueCoding.where(code='yes').count() * 10) + (%resource.repeat(item).where(linkId.startsWith('comm-')).answer.valueCoding.where(code='sometimes').count() * 5)"
            _text:
              cqfExpression:
                language: text/fhirpath
                expression: "'**Total Score:** ' & %commSectionTotal.toString()"

