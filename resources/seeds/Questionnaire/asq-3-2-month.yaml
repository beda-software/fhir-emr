                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

