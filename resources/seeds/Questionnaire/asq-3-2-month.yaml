      # ============================================================
      # STEP 4: PROBLEM SOLVING
      # ============================================================
      - linkId: problem-solving
        text: Problem Solving
        type: group
        item:
          - linkId: ps-1
            text: "1. Does your baby look at objects that are 8–10 inches away?"
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
