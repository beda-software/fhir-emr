                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 0

          - linkId: fm-5
            text: "5. Does your baby hold his hands open or partly open when he is awake (rather than in fists, as they were when he was a newborn)?"
            type: choice
            required: true
            itemControl:
              coding:
                - code: inline-choice
            answerOption:
              - valueCoding:
                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 5
              - valueCoding:
                  code: "not-yet"
                  display: "Not yet"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
