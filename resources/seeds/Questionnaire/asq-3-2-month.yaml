                  code: "yes"
                  display: "Yes"
                extension:
                  - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                    valueDecimal: 10
              - valueCoding:
                  code: "sometimes"
                  display: "Sometimes"
