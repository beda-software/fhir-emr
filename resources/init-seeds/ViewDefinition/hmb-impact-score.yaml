resourceType: ViewDefinition
id: hmb-impact-score
name: hmb_impact_score
status: active
resource: QuestionnaireResponse
description: >-
  One row per Heavy Menstrual Bleeding screening QuestionnaireResponse,
  extracting the reported impact of the period on daily activities for the
  HMB diagnostic chart.
where:
  - path: questionnaire = 'heavy-menstrual-bleeding-screening'
select:
  - column:
      - name: id
        path: getResourceKey()
        type: string
      - name: patient_id
        path: subject.getReferenceKey(Patient)
        type: string
      - name: axis_label
        path: authored
        type: dateTime
      - name: title
        path: "'Impact of Period on Daily Activities'"
        type: string
      - name: value_integer
        path: item.item.where(linkId = 'activity-impact-score').answer.value.ofType(integer).first()
        type: integer
