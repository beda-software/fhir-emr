resourceType: ViewDefinition
id: hmb-pain-score
name: hmb_pain_score
status: active
resource: QuestionnaireResponse
description: >-
  One row per Heavy Menstrual Bleeding screening QuestionnaireResponse,
  extracting the reported period pain score for the HMB diagnostic chart.
where:
  - path: questionnaire = 'heavy-menstrual-bleeding-screening'
select:
  - column:
      - name: id
        path: getResourceKey()
        type: string
      - name: patient_id
        path: subject.getReferenceKey(Patient)
        type: string
      - name: axis_label
        path: authored
        type: dateTime
      - name: title
        path: "'Period Pain Score'"
        type: string
      - name: value_integer
        path: item.item.where(linkId = 'menstrual-pain-score').answer.value.ofType(integer).first()
        type: integer
