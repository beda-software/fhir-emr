          code: "3"
          display: "3 years"
      - valueCoding:
          code: "4"
          display: "4 years"
      - valueCoding:
          code: "5-6"
          display: "5-6 years"
      - valueCoding:
          code: "7-10"
          display: "7-10 years"
      - valueCoding:
          code: "11-14"
          display: "11-14 years"
      - valueCoding:
          code: "15-21"
          display: "15-21 years"

  # TODDLER SECTIONS (1-4 years)
  # Screening for 1 year
  - linkId: behavioral-screening-1yo-group
    text: Behavioral/Social/Emotional Screening for 1 Year / 12 Months
    type: group
    itemControl:
      coding:
      - code: group-voice
    enableWhen:
      - question: age-group
        operator: "="
        answerCoding:
          code: "1"
    item:
      - linkId: reaction-to-new-people
        text: How does your child react to new people or situations?
        type: choice
        itemControl:
          coding:
            - code: inline-choice
        answerOption:
          - valueCoding:
              code: friendly-curious
              display: Friendly and curious
          - valueCoding:
              code: shy-cautious
              display: Shy or cautious
          - valueCoding:
              code: fearful-upset
              display: Fearful or upset
      - linkId: shows-affection
        text: Does your child show affection to familiar people?
        type: choice
        itemControl:
          coding:
            - code: inline-choice
        answerOption:
          - valueCoding:
              code: "yes"
              display: "Yes"
          - valueCoding:
              code: "no"
              display: "No"
        choiceOrientation: horizontal
      - linkId: favorite-people-or-toys
        text: Does your child have favorite people or toys?
        type: choice
        itemControl:
          coding:
            - code: inline-choice
        answerOption:
          - valueCoding:
              code: "yes"
              display: "Yes"
          - valueCoding:
              code: "no"
              display: "No"
        choiceOrientation: horizontal
      - linkId: shows-fear
        text: Does your child show fear in some situations (e.g., loud sounds,
          strangers)?
        type: choice
        itemControl:
          coding:
            - code: inline-choice
        answerOption:
          - valueCoding:
              code: "yes"
              display: "Yes"
          - valueCoding:
              code: "no"
              display: "No"
        choiceOrientation: horizontal
      - linkId: notices-others-upset
        text:
          Does your child notice when others are upset (e.g., looks concerned or
          frowns)?
        type: choice
        itemControl:
          coding:
            - code: inline-choice
        answerOption:
          - valueCoding:
              code: "yes"
              display: "Yes"
          - valueCoding:
              code: "no"
              display: "No"
        choiceOrientation: horizontal
      - linkId: expresses-frustration
        text: How does your child express frustration or anger?
        type: text
      - linkId: responds-to-comfort
        text: Does your child calm down when comforted by a parent or caregiver?
        type: choice
        itemControl:
          coding:
            - code: inline-choice
        answerOption:
          - valueCoding:
              code: "yes"
              display: "Yes"
          - valueCoding:
              code: "no"
              display: "No"
        choiceOrientation: horizontal
      - linkId: social-referencing
