id: gad-7
resourceType: Questionnaire
name: gad-7
title: GAD-7
status: active
subjectType:
  - Encounter
  - Patient
useContext:
  - code:
      code: questionnaire-type
      system: https://beda.software/FHIR/CodeSystem/questionnaire-type
    value:
      CodeableConcept:
        coding:
          - code: form-library
mapping:
  - reference: urn:uuid:Mapping:gad-7-extract
launchContext:
  - name:
      code: Patient
    type:
      - Patient
  - name:
      code: Author
    type:
      - PractitionerRole
      - Practitioner
      - Patient
      - Organization
item:
  - text: DateTime
    type: dateTime
    linkId: dateTime
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "now()"

  - text: PatientId
    type: string
    linkId: patientId
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.id"

  - text: PatientName
    type: string
    linkId: patientName
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.name.first().given.first() + ' ' + %Patient.name.first().family"

  - text: Over the last two weeks, how often have you been bothered by the following problems?
    type: group
    linkId: gad-7
    item:
      - linkId: 69725-0
        text: Feeling nervous, anxious, or on edge
        required: true
        type: choice
        itemControl:
          coding:
            - code: inline-choice
        answerOption:
          - valueCoding:
              system: "http://loinc.org"
              code: "LA6568-5"
              display: "Not at all"
              extension:
                - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                  valueDecimal: 0
          - valueCoding:
              system: "http://loinc.org"
              code: "LA6569-3"
              display: "Several days"
              extension:
                - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                  valueDecimal: 1
          - valueCoding:
              system: "http://loinc.org"
              code: "LA6570-1"
              display: "More than half the days"
              extension:
                - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                  valueDecimal: 2
          - valueCoding:
              system: "http://loinc.org"
              code: "LA6571-9"
              display: "Nearly every day"
              extension:
                - url: "http://hl7.org/fhir/StructureDefinition/itemWeight"
                  valueDecimal: 3

