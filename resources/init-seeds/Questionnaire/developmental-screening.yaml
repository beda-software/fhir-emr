      - linkId: build-tower
        text: Can your child build a tower of at least 4 blocks?
        type: choice
        itemControl:
          coding:
            - code: inline-choice
        answerOption:
          - valueCoding:
              code: "yes"
              display: "Yes"
          - valueCoding:
              code: "no"
              display: "No"
        choiceOrientation: horizontal
      - linkId: draw-circles
        text: Can your child draw circles or vertical lines?
        type: choice
        itemControl:
          coding:
            - code: inline-choice
        answerOption:
          - valueCoding:
              code: "yes"
              display: "Yes"
          - valueCoding:
              code: "no"
              display: "No"
        choiceOrientation: horizontal
      - linkId: concerns-about-development-30mo
        text: Do you have any concerns about your child's development?
        type: choice
        itemControl:
          coding:
            - code: inline-choice
        answerOption:
          - valueCoding:
              code: "yes"
              display: "Yes"
          - valueCoding:
              code: "no"
              display: "No"
        choiceOrientation: horizontal
      - linkId: concerns-about-development-details
        text: Describe your concerns
