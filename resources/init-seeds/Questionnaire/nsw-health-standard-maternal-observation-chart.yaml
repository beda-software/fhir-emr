                    item.where(linkId='modifications-amendments-measurement').answer.valueCoding.code = 'temperature' and
                    item.where(linkId='modifications-amendments-date').answer.valueDateTime <= %TempDate.toDateTime() and
                    item.where(linkId='modifications-amendments-valid-until').answer.valueDateTime >= %TempDate.toDateTime()
                  ).last()
              - name: TempModificationMinValue
                language: text/fhirpath
                expression: >-
