                #   display: L/min

              - linkId: o2-device-mode
                text: Device mode
                type: choice
                entryFormat: Select device mode
                itemControl:
                  coding:
                    - code: inline-choice
                answerOption:
                  - valueCoding:
                      code: RA
                      display: Room Air
                  - valueCoding:
                      code: NP
                      display: Nasal Prongs
                  - valueCoding:
