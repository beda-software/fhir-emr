                text: Value, max
                type: decimal
                entryFormat: Enter value

              - linkId: modifications-amendments-value-unit
                text: Unit
                type: choice
                readOnly: true
                calculatedExpression:
                  language: text/fhirpath
                  expression: >-
                    %qitem.answerOption.valueCoding.where(
                      code=iif(
                        %Measurement = 'respiratory-rate',
                        '/min',
                        iif(
                          %Measurement = 'o2-saturation',
                          '%',
                          iif(
                            %Measurement = 'heart-rate' or
                              %Measurement = 'respiratory-rate',
                            '/min',
                            iif(
                              %Measurement = 'systolic-blood-pressure' or
                                %Measurement = 'diastolic-blood-pressure',
