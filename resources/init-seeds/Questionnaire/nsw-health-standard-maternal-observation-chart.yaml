              - name: TempModificationMaxValue
                language: text/fhirpath
                expression: >-
                  %TempModificationGroup.item.where(linkId='modifications-amendments-value-max').answer.valueDecimal
              - name: TempLevel
                language: text/fhirpath
                expression: >-
                  iif(
                    %TempModificationGroup.exists() and
