                language: text/fhirpath
                expression: >-
                  iif(%NeurologicalValue.exists(),
                    iif(%NeurologicalValue.first() = 'alert', {},
                      iif(%NeurologicalValue.first() in ('change-in-behaviour' | 'voice'), 'yellow-zone', 'red-zone')),
