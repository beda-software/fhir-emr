              - name: MaternalPostBirthBloodLossDefaultLevel
                language: text/fhirpath
                expression: >-
                  iif(
                    %MaternalPostBirthBloodLoss.exists(),
                    iif(
                      %MaternalPostBirthBloodLoss.first() <= 300,
                      {},
                      iif(
                        %MaternalPostBirthBloodLoss.first() <= 500,
                        'blue-zone',
                        iif(
                          %MaternalPostBirthBloodLoss.first() <= 1000,
                          'yellow-zone',
                          'red-zone'
                        )
                      )
                    ),
                    {}
                  )

              - name: MaternalPostBirthBloodLossModificationGroup
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(
                    linkId='modifications-amendments-table-group'
                  ).where(
                    item.where(linkId='modifications-amendments-measurement').answer.valueCoding.code = 'measured-cumulative-blood-loss' and
                    item.where(linkId='modifications-amendments-date').answer.valueDateTime <= %MaternalPostBirthBloodLossDate.toDateTime() and
                    item.where(linkId='modifications-amendments-valid-until').answer.valueDateTime >= %MaternalPostBirthBloodLossDate.toDateTime()
                  ).last()
              - name: MaternalPostBirthBloodLossModificationMinValue
                language: text/fhirpath
                expression: >-
                  %MaternalPostBirthBloodLossModificationGroup.item.where(linkId='modifications-amendments-value-min').answer.valueDecimal
              - name: MaternalPostBirthBloodLossModificationMaxValue
                language: text/fhirpath
                expression: >-
