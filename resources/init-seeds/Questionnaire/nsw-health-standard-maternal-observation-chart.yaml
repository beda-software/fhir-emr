  - linkId: observation-chart-tabs-view
    type: group
    itemControl:
      coding:
        - code: group-tabs
    item:
      - linkId: observations-graph-wizard-group
        text: Observations
        type: group
        item:
          - linkId: explanation-group
            type: group
            hidden: true
            item:
              - linkId: blue-zone-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: >-
                  :::info-alert

                  ### **Blue Zone Response to Cumulative Blood Loss**


                  If a woman in your care has a **blue zone cumulative blood loss observation** you **MUST:**

                  1. Increase alertness and assess for continued bleeding.

                  2. If bleeding continues, refer to the management described in the NSW Health Guideline – Postpartum Haemorrhage.

                  :::

              - linkId: yellow-zone-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: >-
                  :::warning-alert

                  ### **Yellow Zone Response**

                  If a woman in your care has any **yellow zone observations or additional criteria(*)** you **MUST:**

                  1. Initiate appropriate clinical care.

                  2. Repeat and increase the frequency of observations, as indicated by the woman’s condition.

                  3. Consult promptly with the **MIDWIFE / NURSE IN CHARGE** to determine if a **CLINICAL REVIEW** (or other CERS call) should be made.


                  **Consider the following:**

                  - What is usual for the woman and are there documented ALTERATIONS TO CALLING CRITERIA?

                  - Do the trend in observations suggest deterioration?

                  - Is there more than one yellow zone observation or additional criterion?

                  - Are you concerned about the woman?


                  **If a CLINICAL REVIEW is called:**

                  1. Reassess the woman and escalate according to your local CERS if the call is not attended within 30 minutes or you are becoming more concerned.

                  2. Document an A–G assessment, reason for escalation, treatment and outcome in the woman’s health care record.

                  3. Inform the Attending Medical Officer that a call was made as soon as it is practicable.


                  **(*)Additional YELLOW ZONE Criteria:**

                  - Increasing oxygen requirement

                  - Altered mental state: agitation, confusion or unexpectedly uncooperative

                  - Decreasing or absent deep tendon reflexes

                  - Anuria or urine output < 80 mLs total over 4 hours

                  - Blood Glucose Level 2 - 4 mmol/L

                  - New, increasing or uncontrolled pain

                  - Any risk factors, signs or symptoms of sepsis

                  - New Proteinuria (≥ +)

                  - Any current antepartum bleeding

                  - **Concern by the woman or family member**

                  - **Concern by you or any staff member**

                  :::

              - linkId: red-zone-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: >-
                  :::error-alert


                  ### **Red Zone Response**

                  If a woman in your care has any **red zone observations or additional criteria(*)** you **MUST** call for a **RAPID RESPONSE** (as per local CERS) **AND**:

                  1. Initiate appropriate clinical care.

                  2. Inform the **MIDWIFE / NURSE IN CHARGE** that you have called for a **RAPID RESPONSE**.

                  3. Repeat and increase the frequency of observations, as indicated by the woman’s condition.

                  4. Document an A–G assessment, reason for escalation, treatment and outcome in the woman’s health care record.

                  5. Inform the attending medical officer that a call was made as soon as it is practicable.


                  **(*)Additional RED ZONE Criteria**

                  - Cardiac or respiratory arrest

                  - Airway obstruction or stridor

                  - Unresponsive woman

                  - Seizures

                  - Increasing oxygen requirements to maintain oxygen saturation > 90%

                  - Sudden decrease in Level of Consciousness (drop of 2 or more points on the GCS)

                  - Arterial Blood Gas: PaO2 < 60 mmHg, or PaCO2 > 60 mmHg, or pH < 7.2, or BE < -5

                  - Venous Blood Gas PvCO2 > 65 mmHg, or pH < 7.2

                  - Blood Glucose Level < 2 mmol/L

                  - Deterioration not reversed within 1 hour of Clinical Review

                  - Persistent low urine output < 160 mLs over 8 hours

                  - Postpartum haemorrhage ≥ 500 mL - 1000 mL with continued bleeding

                  - Acute/severe chest pain

                  - Any continued/heavy antepartum bleeding

                  - **Serious concern by the woman or family member**

                  - **Serious concern by any staff member**

                  :::

          # Respiratory Rate

          - linkId: respiratory-rate-table-group
            text: Respiratory Rate
            type: group
            repeats: true
            enableChart:
              linkIdX: respiratory-rate-date
              linkIdY: respiratory-rate-value
            chartYAxisRange:
              low:
                value: 0
              high:
                value: 50
            chartHighlight:
              # 0–5 red zone
              - to: 5
                color: "#F7C3B799"
              # 5–10 yellow zone
              - from: 5
                to: 10
                color: "#FFF4B599"
              # 10–25 normal (no shading)
              # 25–30 yellow zone
              - from: 25
                to: 30
                color: "#FFF4B599"
              # ≥ 30 red zone
              - from: 30
                color: "#F7C3B799"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: RRDate
                language: text/fhirpath
                expression: >-
                  %context.item.where(linkId='respiratory-rate-date').answer.valueDateTime
              - name: RR
                language: text/fhirpath
                expression: "%context.item.where(linkId='respiratory-rate-value').answer.valueQuantity.value"
              - name: RRDefaultLevel
                language: text/fhirpath
                expression: >-
                  iif(%RR.exists(),
                    iif(%RR.first() <= 5, 'red-zone',
                      iif(%RR.first() <= 10, 'yellow-zone',
                        iif(%RR.first() <= 25, {},
                          iif(%RR.first() <= 30, 'yellow-zone', 'red-zone')))),
                    {}
                  )
              - name: RRModificationGroup
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(
                    linkId='modifications-amendments-table-group'
                  ).where(
                    item.where(linkId='modifications-amendments-measurement').answer.valueCoding.code = 'respiratory-rate' and
                    item.where(linkId='modifications-amendments-date').answer.valueDateTime <= %RRDate.toDateTime() and
                    item.where(linkId='modifications-amendments-valid-until').answer.valueDateTime >= %RRDate.toDateTime()
                  ).last()
              - name: RRModificationMinValue
                language: text/fhirpath
                expression: >-
                  %RRModificationGroup.item.where(linkId='modifications-amendments-value-min').answer.valueDecimal
              - name: RRModificationMaxValue
                language: text/fhirpath
                expression: >-
                  %RRModificationGroup.item.where(linkId='modifications-amendments-value-max').answer.valueDecimal
              - name: RRLevel
                language: text/fhirpath
                expression: >-
                  iif(
                    %RRModificationGroup.exists() and
                      %RR >= %RRModificationMinValue and
                      %RR <= %RRModificationMaxValue,
                    {},
                    %RRDefaultLevel
                  )
            item:
              - linkId: respiratory-rate-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: respiratory-rate-value
                text: Respiratory Rate, breaths/minute
                type: quantity
                entryFormat: Enter value
                unit:
                  code: /min
                  system: http://unitsofmeasure.org
                  display: breaths/min

              - linkId: respiratory-rate-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%RRLevel & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: >-
                    %RRLevel.exists()

