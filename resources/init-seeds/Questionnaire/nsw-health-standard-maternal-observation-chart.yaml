                    {},
                    %MaternalPostBirthBloodLossDefaultLevel
                  )
            item:
              - linkId: maternal-post-birth-blood-loss-description
                text: >-
                  :::info-alert

                  **Total blood loss at birth = antepartum + intrapartum + blood loss associated with the birth episode.**

                  This must be documented below.

                  Cumulative blood loss in the Yellow Zone requires immediate escalation to a Medical Officer (as per local CERS).

                  Refer to the NSW Health Postpartum Haemorrhage Guideline.

                  *Note: the observed blood loss may not reflect the total blood loss i.e. some of the loss may be concealed in the uterus.*

                  :::

                type: display
                itemControl:
                  coding:
