          # Temperature

          - linkId: temperature-table-group
            text: Temperature (°C)
            type: group
            repeats: true
            enableChart:
              linkIdX: temperature-date
              linkIdY: temperature-value
            chartYAxisRange:
              low:
                value: 34
              high:
                value: 41
            chartHighlight:
              # <= 35.5 red zone
              - to: 35.5
                color: "#F7C3B799"
              # 35.5–36.0 yellow zone
              - from: 35.5
                to: 36.0
                color: "#FFF4B599"
              # 36.0–37.5 normal (no shading)
              # 37.5–38.5 yellow zone
              - from: 37.5
                to: 38.5
                color: "#FFF4B599"
              # >= 38.5 red zone
              - from: 38.5
                color: "#F7C3B799"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: TempDate
                language: text/fhirpath
                expression: >-
                  %context.item.where(linkId='temperature-date').answer.valueDateTime
              - name: Temp
                language: text/fhirpath
                expression: "%context.item.where(linkId='temperature-value').answer.valueQuantity.value"
              - name: TempDefaultLevel
                language: text/fhirpath
                expression: >-
                  iif(%Temp.exists(),
                    iif(%Temp.first() <= 35.5, 'red-zone',
                      iif(%Temp.first() <= 36.0, 'yellow-zone',
                        iif(%Temp.first() <= 37.5, {},
                          iif(%Temp.first() <= 38.5, 'yellow-zone', 'red-zone')))),
                    {}
