id: vitals
name: vitals
title: Vitals
resourceType: Questionnaire
status: active
description: Records routine vital signs including blood pressure, heart rate, respiratory rate, temperature, and oxygen saturation.
mapping:
  - reference: urn:uuid:Mapping:vitals
subjectType:
  - Encounter
  - Patient
launchContext:
  - name:
      code: Patient
    type:
      - Patient
useContext:
- code:
    code: questionnaire-type
    system: https://beda.software/FHIR/CodeSystem/questionnaire-type
  value:
    CodeableConcept:
      coding:
      - code: form-library
- code:
    code: category
    system: https://beda.software/FHIR/CodeSystem/questionnaire-category
  value:
    CodeableConcept:
      coding:
      - code: paediatrics
        system: https://beda.software/FHIR/CodeSystem/questionnaire-category
      - code: common
        system: https://beda.software/FHIR/CodeSystem/questionnaire-category
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
url: https://aidbox.emr.beda.software/fhir/Questionnaire/vitals
item:
  - text: PatientId
    type: string
    linkId: patientId
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.id"
  - text: PatientName
    type: string
    linkId: patientName
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.name.first().given.first() + ' ' + %Patient.name.first().family"
  - linkId: vitals-data
    type: group
    itemControl:
      coding:
      - code: group-voice
    item:
    - linkId: height
      type: quantity
      text: Height
      unitOption:
        - code: cm
          system: http://unitsofmeasure.org
          display: cm
    - linkId: weight
      type: quantity
      text: Weight
      unitOption:
        - code: kg
          system: http://unitsofmeasure.org
          display: kg
    - linkId: temperature
      type: quantity
      text: Temperature
      unitOption:
        - code: Cel
          system: http://unitsofmeasure.org
          display: °C
    - linkId: oxygen-saturation
      type: quantity
      text: Oxygen saturation
      unitOption:
        - code: "%"
          system: http://unitsofmeasure.org
          display: "%"
    - linkId: pulse-rate
      type: quantity
      text: Pulse rate
      unitOption:
        - code: bpm
          system: http://unitsofmeasure.org
          display: bpm
    - linkId: respiratory-rate
      type: quantity
      text: Respiratory Rate
      unitOption:
        - code: bpm
          system: http://unitsofmeasure.org
          display: bpm

    - linkId: blood-pressure
      type: group
      item:
        - linkId: blood-pressure-systolic-diastolic
          type: group
          itemControl:
            coding:
              - code: inline-choice
          item:
            - linkId: blood-pressure-systolic
              type: quantity
              text: BP systolic
              unitOption:
                - code: mmHg
                  system: http://unitsofmeasure.org
                  display: mmHg
            - linkId: blood-pressure-diastolic
              type: quantity
              text: BP diastolic
              unitOption:
                - code: mmHg
                  system: http://unitsofmeasure.org
                  display: mmHg
  - linkId: bmi
    text: BMI
    type: decimal
    required: true
    readOnly: true
    unit:
      code: kg/m2
      system: http://unitsofmeasure.org
      display: kg/m2
    calculatedExpression:
      language: text/fhirpath
      expression: >-
        (
          %QuestionnaireResponse.repeat(item).where(linkId='weight').answer.valueQuantity.value.toDecimal()
          /
          (
            (%QuestionnaireResponse.repeat(item).where(linkId='height').answer.valueQuantity.value.toDecimal() / 100)
            *
            (%QuestionnaireResponse.repeat(item).where(linkId='height').answer.valueQuantity.value.toDecimal() / 100)
          )
        ).round(2)
