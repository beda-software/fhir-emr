id: ped-obs-chart-12y
resourceType: Questionnaire
name: ped-obs-chart-12y
title: Paediatric Observation Chart (12 Years and over)
status: active
subjectType:
  - Patient
  - Encounter
url: ped-obs-chart-12y
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
useContext:
  - code:
      code: questionnaire-type
      system: https://beda.software/FHIR/CodeSystem/questionnaire-type
    value:
      CodeableConcept:
        coding:
          - code: form-library
launchContext:
  - name:
      code: Patient
    type:
      - Patient
  - name:
      code: Author
    type:
      - PractitionerRole
      - Practitioner
      - Patient
      - Organization
item:
  - text: PatientId
    type: string
    linkId: patientId
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.id"

  - text: PatientName
    type: string
    linkId: patientName
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.name.first().given.first() + ' ' + %Patient.name.first().family"

  - linkId: observation-chart-tabs-view
    type: group
    itemControl:
      coding:
        - code: group-tabs
    item:
      - linkId: observations-graph-wizard-group
        text: Observations
        type: group
        item:
          - linkId: explanation-group
            type: group
            hidden: true
            item:
              - linkId: blue-zone-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: >-
                  :::info-alert

                  ### **Blue Zone Response**

                  If your patient has any **BLUE ZONE observations** you **MUST:**

                  1. Initiate appropriate clinical care.

                  2. Increase the frequency of observations, as indicated by your patient's condition.

                  3. Manage anxiety, pain and review oxygenation in consultation with the **NURSE IN CHARGE**.

                  4. You can make a call to escalate the care of your patient at any time if you are worried or unsure whether to call.


                  **Consider the following:**

                  1. What is usual for your patient and are there documented 'ALTERATIONS TO CALLING CRITERIA'?

                  2. Does the abnormal observation reflect deterioration in your patient?

                  3. Is there an adverse trend in observations?

                  :::

              - linkId: yellow-zone-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: >-
                  :::warning-alert

                  ### **Yellow Zone Response**

                  If your patient has any **YELLOW ZONE observations OR ADDITIONAL CRITERIA (*)** you **MUST:**

                  1. Initiate appropriate clinical care.

                  2. Repeat and increase the frequency of observations, as indicated by your patient's condition.

                  3. Consult promptly with the **NURSE IN CHARGE** to decide whether a **CLINICAL REVIEW** (or other CERS) call should be made.


                  **Consider the following:**

                  - What is usual for your patient and are there documented 'ALTERATIONS TO CALLING CRITERIA'?

                  - Does the trend in observations suggest deterioration?

                  - Is there more than one Yellow Zone observation or additional criteria?

                  - Are you concerned about your patient?


                  **If a CLINICAL REVIEW is called:**

                  1. Reassess your patient and escalate according to your local CERS if the call is not attended within 30 minutes or you are becoming more concerned.

                  2. Document an A–G assessment, reason for escalation, treatment and outcome in your patient's health care record.

                  3. Inform the Attending Medical Officer that a call was made as soon as it is practicable.


                  **(*) Additional YELLOW ZONE Criteria:**

                  - Increasing oxygen requirement

                  - Poor peripheral circulation

                  - Greater than expected fluid loss

                  - Reduced urine output or anuria (< 1mL/kg/hr)

                  - Altered mental state: Agitation, Combative or Inconsolable

                  - New, increasing or uncontrolled pain

                  - New onset of fever > 38.5°C

                  - BGL 2–3 mmol/L

                  - **Concern by you or any staff or family member**

                  :::

              - linkId: red-zone-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: >-
                  :::error-alert

                  ### **Red Zone Response**

                  If your patient has any **RED ZONE observations or ADDITIONAL CRITERIA (*)** you **MUST** call for a **RAPID RESPONSE** (as per local CERS) **AND:**

                  1. **Initiate** appropriate clinical care.

                  2. **Inform** the **NURSE IN CHARGE** that you have called for a Rapid Response.

                  3. **Repeat and increase** the frequency of observations, as indicated by your patient's condition.

                  4. **Document** an A–G assessment, reason for escalation, treatment and outcome in your patient's health care record.

                  5. **Inform** the Attending Medical Officer that a call was made as soon as it is practicable.


                  **(*) Additional RED ZONE Criteria:**

                  - **Cardiac or respiratory arrest**

                  - **Circulatory collapse**

                  - **Patient unresponsive**

                  - **New onset of stridor**

                  - No change or signs of improvement within 1 hour of CERS

                  - 3 or more simultaneous 'Yellow Zone' observations

                  - Significant bleeding

                  - Sudden decrease in Level of Consciousness (a drop of 2 or more points on the GCS)

                  - New or prolonged seizure activity

                  - BGL < 2 mmol/L or symptomatic

                  - **Serious concern by you or any staff or family member**

                  :::

          # Patient / Family Concern

          - linkId: patient-family-concern-table-group
            text: Patient / Family Concern
            type: group
            repeats: true
            enableChart:
              linkIdX: patient-family-concern-date
              linkIdY: patient-family-concern-value
            chartHighlight:
              # Yes (index 0) — yellow zone (warning border, translucent)
              - from: -0.5
                to: 0.5
                color: "#ffe58f99"
              # Not asked (index 2) — neutral row (theme gray_5, translucent)
              - from: 1.5
                to: 2.5
                color: "#d9d9d999"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: Concern
                language: text/fhirpath
                expression: "%context.item.where(linkId='patient-family-concern-value').answer.valueCoding.code"
              - name: ConcernLevel
                language: text/fhirpath
                expression: >-
                  iif(%Concern.exists() and %Concern.first() = 'yes', 'yellow-zone', {})
            item:
              - linkId: patient-family-concern-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                columnWidth:
                  value: 150
                  unit: px
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: patient-family-concern-value
                text: Are you worried they are getting worse?
                type: choice
                entryFormat: Select response
                itemControl:
                  coding:
                    - code: inline-choice
                answerOption:
                  - valueCoding:
                      code: "yes"
                      display: "Yes"
                  - valueCoding:
                      code: "no"
                      display: "No"
                  - valueCoding:
                      code: not-asked
                      display: Not asked

              - linkId: patient-family-concern-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%ConcernLevel & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: "%ConcernLevel.exists()"

          # Respiratory Rate

          - linkId: respiratory-rate-table-group
            text: Respiratory Rate, breaths/min
            type: group
            repeats: true
            enableChart:
              linkIdX: respiratory-rate-date
              linkIdY: respiratory-rate-value
            chartYAxisRange:
              low:
                value: 0
              high:
                value: 60
            chartHighlight:
              # ≤5 red zone
              - to: 5
                color: "#ffccc799"
              # 6–10 yellow zone
              - from: 5
                to: 10
                color: "#ffe58f99"
              # 11–15 blue zone
              - from: 10
                to: 15
                color: "#adcaff99"
              # 16–20 normal (no highlight)
              # 21–30 blue zone
              - from: 20
                to: 30
                color: "#adcaff99"
              # 31–40 yellow zone
              - from: 30
                to: 40
                color: "#ffe58f99"
              # ≥41 red zone
              - from: 40
                color: "#ffccc799"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: RRDate
                language: text/fhirpath
                expression: "%context.item.where(linkId='respiratory-rate-date').answer.valueDateTime.first()"
              - name: RR
                language: text/fhirpath
                expression: "%context.item.where(linkId='respiratory-rate-value').answer.valueQuantity.value"
              - name: RRDefaultLevel
                language: text/fhirpath
                expression: >-
                  iif(%RR.exists(),
                    iif(%RR.first() <= 5, 'red-zone',
                      iif(%RR.first() <= 10, 'yellow-zone',
                        iif(%RR.first() <= 15, 'blue-zone',
                          iif(%RR.first() <= 20, {},
                            iif(%RR.first() <= 30, 'blue-zone',
                              iif(%RR.first() <= 40, 'yellow-zone', 'red-zone')))))),
                    {}
                  )
              - name: RRModificationGroup
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(linkId='modifications-amendments-table-group').where(
                    item.where(linkId='modifications-amendments-measurement').answer.valueCoding.code = 'respiratory-rate' and
                    item.where(linkId='modifications-amendments-date').answer.valueDateTime <= %RRDate.toDateTime() and
                    item.where(linkId='modifications-amendments-valid-until').answer.valueDateTime >= %RRDate.toDateTime()
                  ).last()
              - name: RRModificationMinValue
                language: text/fhirpath
                expression: "%RRModificationGroup.item.where(linkId='modifications-amendments-value-min').answer.valueDecimal"
              - name: RRModificationMaxValue
                language: text/fhirpath
                expression: "%RRModificationGroup.item.where(linkId='modifications-amendments-value-max').answer.valueDecimal"
              - name: RRLevel
                language: text/fhirpath
                expression: >-
                  iif(
                    %RRModificationGroup.exists() and %RR >= %RRModificationMinValue and %RR <= %RRModificationMaxValue,
                    {},
                    %RRDefaultLevel
                  )
            item:
              - linkId: respiratory-rate-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                columnWidth:
                  value: 150
                  unit: px
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: respiratory-rate-value
                text: Respiratory Rate, breaths/min
                type: quantity
                entryFormat: Enter value
                unit:
                  code: /min
                  system: http://unitsofmeasure.org
                  display: breaths/min

              - linkId: respiratory-rate-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%RRLevel & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: "%RRLevel.exists()"

          # Respiratory Distress

          - linkId: respiratory-distress-table-group
            text: Respiratory Distress
            type: group
            repeats: true
            enableChart:
              linkIdX: respiratory-distress-date
              linkIdY: respiratory-distress-value
            chartHighlight:
              # Mild (index 1) — blue zone
              - from: 0.5
                to: 1.5
                color: "#adcaff99"
              # Moderate (index 2) — yellow zone
              - from: 1.5
                to: 2.5
                color: "#ffe58f99"
              # Severe (index 3) — red zone
              - from: 2.5
                to: 3.5
                color: "#ffccc799"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: RespDistress
                language: text/fhirpath
                expression: "%context.item.where(linkId='respiratory-distress-value').answer.valueCoding.code"
              - name: RespDistressLevel
                language: text/fhirpath
                expression: >-
                  iif(%RespDistress.exists(),
                    iif(%RespDistress.first() = 'normal', {},
                      iif(%RespDistress.first() = 'mild', 'blue-zone',
                        iif(%RespDistress.first() = 'moderate', 'yellow-zone', 'red-zone'))),
                    {}
                  )
            item:
              - linkId: respiratory-distress-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                columnWidth:
                  value: 150
                  unit: px
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: respiratory-distress-value
                text: Respiratory Distress
                type: choice
                entryFormat: Select level
                itemControl:
                  coding:
                    - code: inline-choice
                answerOption:
                  - valueCoding:
                      code: normal
                      display: Normal
                  - valueCoding:
                      code: mild
                      display: Mild
                  - valueCoding:
                      code: moderate
                      display: Moderate
                  - valueCoding:
                      code: severe
                      display: Severe

              - linkId: respiratory-distress-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%RespDistressLevel & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: "%RespDistressLevel.exists()"

          # SpO2

          - linkId: spo2-table-group
            text: SpO2, %
            type: group
            repeats: true
            enableChart:
              linkIdX: spo2-date
              linkIdY: spo2-value
            chartYAxisRange:
              low:
                value: 70
              high:
                value: 100
            chartHighlight:
              # ≤90 red zone
              - to: 90
                color: "#ffccc799"
              # 91–95 yellow zone
              - from: 90
                to: 95
                color: "#ffe58f99"
              # >95 normal
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: SpO2Date
                language: text/fhirpath
                expression: "%context.item.where(linkId='spo2-date').answer.valueDateTime.first()"
              - name: SpO2
                language: text/fhirpath
                expression: "%context.item.where(linkId='spo2-value').answer.valueQuantity.value"
              - name: SpO2DefaultLevel
                language: text/fhirpath
                expression: >-
                  iif(%SpO2.exists(),
                    iif(%SpO2.first() <= 90, 'red-zone',
                      iif(%SpO2.first() <= 95, 'yellow-zone', {})),
                    {}
                  )
              - name: SpO2ModificationGroup
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(linkId='modifications-amendments-table-group').where(
                    item.where(linkId='modifications-amendments-measurement').answer.valueCoding.code = 'o2-saturation' and
                    item.where(linkId='modifications-amendments-date').answer.valueDateTime <= %SpO2Date.toDateTime() and
                    item.where(linkId='modifications-amendments-valid-until').answer.valueDateTime >= %SpO2Date.toDateTime()
                  ).last()
              - name: SpO2ModificationMinValue
                language: text/fhirpath
                expression: "%SpO2ModificationGroup.item.where(linkId='modifications-amendments-value-min').answer.valueDecimal"
              - name: SpO2ModificationMaxValue
                language: text/fhirpath
                expression: "%SpO2ModificationGroup.item.where(linkId='modifications-amendments-value-max').answer.valueDecimal"
              - name: SpO2Level
                language: text/fhirpath
                expression: >-
                  iif(
                    %SpO2ModificationGroup.exists() and %SpO2 >= %SpO2ModificationMinValue and %SpO2 <= %SpO2ModificationMaxValue,
                    {},
                    %SpO2DefaultLevel
                  )
            item:
              - linkId: spo2-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                columnWidth:
                  value: 150
                  unit: px
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: spo2-value
                text: SpO2 %
                type: quantity
                entryFormat: Enter value
                unit:
                  code: "%"
                  system: http://unitsofmeasure.org
                  display: "%"

              - linkId: spo2-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%SpO2Level & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: "%SpO2Level.exists()"

          # Oxygen

          - linkId: oxygen-table-group
            text: Oxygen
            type: group
            repeats: true
            itemControl:
              coding:
                - code: group-table
            item:
              - linkId: oxygen-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                columnWidth:
                  value: 150
                  unit: px
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"

              - linkId: oxygen-flow-rate
                text: O2 L/min or %
                type: quantity
                entryFormat: Enter value

              - linkId: oxygen-device-mode
                text: Device
                type: string
                entryFormat: Enter device

          # Heart Rate

          - linkId: heart-rate-table-group
            text: Heart Rate, beats/min
            type: group
            repeats: true
            enableChart:
              linkIdX: heart-rate-date
              linkIdY: heart-rate-value
            chartYAxisRange:
              low:
                value: 30
              high:
                value: 180
            chartHighlight:
              # ≤40 red zone
              - to: 40
                color: "#ffccc799"
              # 41–50 yellow zone
              - from: 40
                to: 50
                color: "#ffe58f99"
              # 51–60 blue zone
              - from: 50
                to: 60
                color: "#adcaff99"
              # 61–100 normal
              # 101–130 blue zone
              - from: 100
                to: 130
                color: "#adcaff99"
              # 131–150 yellow zone
              - from: 130
                to: 150
                color: "#ffe58f99"
              # ≥151 red zone
              - from: 150
                color: "#ffccc799"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: HRDate
                language: text/fhirpath
                expression: "%context.item.where(linkId='heart-rate-date').answer.valueDateTime.first()"
              - name: HR
                language: text/fhirpath
                expression: "%context.item.where(linkId='heart-rate-value').answer.valueQuantity.value"
              - name: HRDefaultLevel
                language: text/fhirpath
                expression: >-
                  iif(%HR.exists(),
                    iif(%HR.first() <= 40, 'red-zone',
                      iif(%HR.first() <= 50, 'yellow-zone',
                        iif(%HR.first() <= 60, 'blue-zone',
                          iif(%HR.first() <= 100, {},
                            iif(%HR.first() <= 130, 'blue-zone',
                              iif(%HR.first() <= 150, 'yellow-zone', 'red-zone')))))),
                    {}
                  )
              - name: HRModificationGroup
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(linkId='modifications-amendments-table-group').where(
                    item.where(linkId='modifications-amendments-measurement').answer.valueCoding.code = 'heart-rate' and
                    item.where(linkId='modifications-amendments-date').answer.valueDateTime <= %HRDate.toDateTime() and
                    item.where(linkId='modifications-amendments-valid-until').answer.valueDateTime >= %HRDate.toDateTime()
                  ).last()
              - name: HRModificationMinValue
                language: text/fhirpath
                expression: "%HRModificationGroup.item.where(linkId='modifications-amendments-value-min').answer.valueDecimal"
              - name: HRModificationMaxValue
                language: text/fhirpath
                expression: "%HRModificationGroup.item.where(linkId='modifications-amendments-value-max').answer.valueDecimal"
              - name: HRLevel
                language: text/fhirpath
                expression: >-
                  iif(
                    %HRModificationGroup.exists() and %HR >= %HRModificationMinValue and %HR <= %HRModificationMaxValue,
                    {},
                    %HRDefaultLevel
                  )
            item:
              - linkId: heart-rate-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                columnWidth:
                  value: 150
                  unit: px
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: heart-rate-value
                text: Heart Rate, beats/min
                type: quantity
                entryFormat: Enter value
                unit:
                  code: /min
                  system: http://unitsofmeasure.org
                  display: beats/min

              - linkId: heart-rate-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%HRLevel & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: "%HRLevel.exists()"

          # Capillary Refill

          - linkId: capillary-refill-table-group
            text: Capillary Refill
            type: group
            repeats: true
            enableChart:
              linkIdX: capillary-refill-date
              linkIdY: capillary-refill-value
            chartYAxisRange:
              low:
                value: 0
              high:
                value: 6
            chartHighlight:
              # ≥ 3 seconds — yellow zone
              - from: 3
                color: "#ffe58f99"
            itemControl:
              coding:
                - code: group-table
            variable:
              - name: CapRefill
                language: text/fhirpath
                expression: "%context.item.where(linkId='capillary-refill-value').answer.valueQuantity.value"
              - name: CapRefillDefaultLevel
                language: text/fhirpath
                expression: >-
                  iif(%CapRefill.exists(),
                    iif(%CapRefill.first() >= 3, 'yellow-zone', {}),
                    {}
                  )
              - name: CapRefillDate
                language: text/fhirpath
                expression: "%context.item.where(linkId='capillary-refill-date').answer.valueDateTime.first()"
              - name: CapRefillModificationGroup
                language: text/fhirpath
                expression: >-
                  %resource.repeat(item).where(linkId='modifications-amendments-table-group').where(
                    item.where(linkId='modifications-amendments-measurement').answer.valueCoding.code = 'capillary-refill' and
                    item.where(linkId='modifications-amendments-date').answer.valueDateTime <= %CapRefillDate.toDateTime() and
                    item.where(linkId='modifications-amendments-valid-until').answer.valueDateTime >= %CapRefillDate.toDateTime()
                  ).last()
              - name: CapRefillModificationMinValue
                language: text/fhirpath
                expression: "%CapRefillModificationGroup.item.where(linkId='modifications-amendments-value-min').answer.valueDecimal"
              - name: CapRefillModificationMaxValue
                language: text/fhirpath
                expression: "%CapRefillModificationGroup.item.where(linkId='modifications-amendments-value-max').answer.valueDecimal"
              - name: CapRefillLevel
                language: text/fhirpath
                expression: >-
                  iif(
                    %CapRefillModificationGroup.exists() and %CapRefill >= %CapRefillModificationMinValue and %CapRefill <= %CapRefillModificationMaxValue,
                    {},
                    %CapRefillDefaultLevel
                  )
            item:
              - linkId: capillary-refill-date
                text: Date and Time
                type: dateTime
                entryFormat: Select date and time
                columnWidth:
                  value: 150
                  unit: px
                calculatedExpression:
                  language: text/fhirpath
                  expression: "iif(%context.answer.exists(), %context.answer.valueDateTime, now())"
                unit:
                  code: " "
                  display: " "

              - linkId: capillary-refill-value
                text: Capillary Refill, seconds
                type: quantity
                entryFormat: Enter value
                unit:
                  code: s
                  system: http://unitsofmeasure.org
                  display: s

              - linkId: capillary-refill-explanation
                type: display
                itemControl:
                  coding:
                    - code: markdown
                text: Explanation
                _text:
                  cqfExpression:
                    language: text/fhirpath
                    expression: >-
                      %questionnaire.repeat(item).where(linkId=%CapRefillLevel & '-explanation').text
                enableWhenExpression:
                  language: text/fhirpath
                  expression: "%CapRefillLevel.exists()"

          # Systolic Blood Pressure

          - linkId: systolic-blood-pressure-table-group
            text: Systolic Blood Pressure, mmHg
            type: group
            repeats: true
            enableChart:
              linkIdX: systolic-blood-pressure-date
              linkIdY: systolic-blood-pressure-value
            chartYAxisRange:
              low:
                value: 40
              high:
                value: 200
            chartHighlight:
              # ≤80 red zone
              - to: 80
                color: "#ffccc799"
              # 81–90 yellow zone
              - from: 80
                to: 90
                color: "#ffe58f99"
              # 91–120 normal
              # 121–160 blue zone
              - from: 120
                to: 160
                color: "#adcaff99"
              # 161–200 yellow zone
              - from: 160
